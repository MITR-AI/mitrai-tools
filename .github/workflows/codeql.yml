name: CodeQL

# Security analysis (advisory — results appear in the Security tab, not a required merge gate).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: analyze (go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual
      - name: build all modules
        run: |
          set -euo pipefail
          for mod in $(find . -name go.mod -not -path './.git/*'); do
            ( cd "$(dirname "$mod")" && go build ./... )
          done
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
