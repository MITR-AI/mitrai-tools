name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false  # tools are stdlib-only (no go.sum) — skip dep cache to avoid a noisy warning
      - name: Build, vet, test each tool
        run: |
          set -euo pipefail
          # Each tool is a self-contained module (its own go.mod). Test them all.
          found=0
          for mod in $(find . -name go.mod -not -path './.git/*'); do
            dir=$(dirname "$mod")
            echo "::group::$dir"
            ( cd "$dir" && gofmt -l . | (grep . && { echo 'gofmt needed'; exit 1; } || true) \
              && go build ./... && go vet ./... && go test -race ./... )
            echo "::endgroup::"
            found=1
          done
          [ "$found" = 1 ] || { echo "no go modules found"; exit 1; }
